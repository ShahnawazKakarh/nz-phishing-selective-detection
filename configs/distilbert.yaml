# DistilBERT fine-tune for binary phishing/legitimate classification.
model: distilbert
params:
  model_name: distilbert-base-uncased
  max_length: 256
  learning_rate: 2.0e-5
  weight_decay: 0.01
  num_train_epochs: 3
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  warmup_ratio: 0.1
  seed: 42
  fp16: false
  max_train_samples: -1
